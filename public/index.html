<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page-shell">

    <h1>Change Calculator</h1>

    <!-- Top row: left input | center image+button | right input -->
    <div class="top-row">

      <div class="field-box">
        <label for="amount-due">How much is for sale?</label>
        <input id="amount-due" type="number" step="0.01">
      </div>

      <div class="center-box">
            
        <img 
          src="https://freepngimg.com/save/26017-united-states-dollar-banknote-transparent-background/800x401"
          alt="Dollar bill" 
          class="center-money-pic"
        >
        <button id="calculate-change">Calculate</button>
      </div>

      <div class="field-box">
        <label for="amount-received">How much did the customer give you?</label>
        <input id="amount-received" type="number" step="0.01">
      </div>

    </div>

    <!-- Dollars output section -->
    <div class="dollars-section">
      <h2>Dollars</h2>
      <div class="dollar-output-box">
        <p id="dollars-output">0</p>
      </div>
    </div>

    <!-- Coins row -->
    <div class="coins-row">

      <div class="coin-card">
        <h3>Quarter</h3>
        <img 
          src="https://upload.wikimedia.org/wikipedia/commons/a/a0/2006_Quarter_Proof.png"
          alt="Quarter" 
          class="coin-pic"
        >
        <p id="quarters-output">0</p>
      </div>

      <div class="coin-card">
        <h3>Dime</h3>
        <img 
          src="https://freepngimg.com/save/48672-dime-image-free-transparent-image-hd/800x800"
          alt="Dime" 
          class="coin-pic"
        >
        <p id="dimes-output">0</p>
      </div>

      <div class="coin-card">
        <h3>Nickel</h3>
        <img 
          src="https://freepngimg.com/save/48921-nickel-image-free-transparent-image-hd/512x512"
          alt="Nickel" 
          class="coin-pic"
        >
        <p id="nickels-output">0</p>
      </div>

      <div class="coin-card">
        <h3>Pennies</h3>
        <img 
          src="https://upload.wikimedia.org/wikipedia/commons/8/84/2005-Penny-Uncirculated-Obverse.png"
          alt="Penny" 
          class="coin-pic"
        >
        <p id="pennies-output">0</p>
      </div>

    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
